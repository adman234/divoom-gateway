name: Firmware

on:
  push:
    branches: [main]
    paths: ['firmware/**', 'flasher/**', '.github/workflows/firmware.yml']
  pull_request:
    paths: ['firmware/**', 'flasher/**', '.github/workflows/firmware.yml']
  workflow_dispatch:

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build
        working-directory: firmware
        run: pio run -e esp32dev

      - name: Merge web-flashable binary
        working-directory: firmware
        run: |
          pio pkg exec -p tool-esptoolpy -- esptool.py --chip esp32 merge_bin \
            -o ../flasher/divoom-gateway-esp32.bin \
            --flash_mode dio --flash_freq 40m --flash_size 4MB \
            0x1000 .pio/build/esp32dev/bootloader.bin \
            0x8000 .pio/build/esp32dev/partitions.bin \
            0xe000 ~/.platformio/packages/framework-arduinoespressif32/tools/partitions/boot_app0.bin \
            0x10000 .pio/build/esp32dev/firmware.bin

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: divoom-gateway-esp32
          path: |
            flasher/divoom-gateway-esp32.bin
            firmware/.pio/build/esp32dev/firmware.bin

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: flasher

  deploy:
    name: Deploy web flasher
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
